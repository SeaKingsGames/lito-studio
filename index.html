// ─── GROQ API (gratis) ────────────────────────────────────────────────────────
async function callGroq(groqKey, systemPrompt, userMsg) {
  const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
    method: "POST",
    headers: {
      "Authorization": `Bearer ${groqKey}`,
      "Content-Type": "application/json",
    },
    body: JSON.stringify({
      model: "llama-3.3-70b-versatile",
      messages: [
        {role: "system", content: systemPrompt},
        {role: "user", content: userMsg},
      ],
      max_tokens: 1000,
      temperature: 0.9,
    }),
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || `Groq HTTP ${res.status}`);
  }
  const data = await res.json();
  return data.choices?.[0]?.message?.content || "";
}

// ─── FAL.AI IMAGE - text2img o img2img según si hay referencia ────────────────
async function generateFalImage(prompt, falKey, referenceUrl = null) {
  // Si hay imagen de referencia → img2img (MÁXIMA consistencia de personaje)
  if (referenceUrl) {
    const res = await fetch("https://fal.run/fal-ai/flux/dev/image-to-image", {
      method: "POST",
      headers: {"Authorization": `Key ${falKey}`, "Content-Type": "application/json"},
      body: JSON.stringify({
        image_url: referenceUrl,
        prompt: prompt.slice(0, 600),
        strength: 0.60,          // 0=copia exacta, 1=ignora referencia. 0.6 = mantiene a Lito pero cambia pose/expresión
        num_inference_steps: 25,
        guidance_scale: 3.5,
      }),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      // Si falla img2img, fallback a text2img
      console.warn("img2img falló, usando text2img:", err);
    } else {
      const data = await res.json();
      const url = data.images?.[0]?.url;
      if (url) return url;
    }
  }

  // text2img estándar (sin referencia o si img2img falló)
  const res = await fetch("https://fal.run/fal-ai/flux/schnell", {
    method: "POST",
    headers: {"Authorization": `Key ${falKey}`, "Content-Type": "application/json"},
    body: JSON.stringify({
      prompt: prompt.slice(0, 500),
      image_size: "square_hd",
      num_images: 1,
      num_inference_steps: 4,
    }),
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.detail || err.message || `HTTP ${res.status}`);
  }
  const data = await res.json();
  const url = data.images?.[0]?.url;
  if (!url) throw new Error("fal.ai no devolvió URL de imagen");
  return url;
}

// ─── FAL.AI VIDEO (Wan2.1) ────────────────────────────────────────────────────
async function animateWithWan(imageUrl, falKey) {
  const motionPrompt = "cute chibi axolotl character blinking slowly, gills wiggling gently, subtle breathing movement, smooth looping animation, 2D cartoon style";
  const submitRes = await fetch("https://queue.fal.run/fal-ai/wan/v2.1/1.3b/image-to-video", {
    method: "POST",
    headers: {"Authorization": `Key ${falKey}`, "Content-Type": "application/json"},
    body: JSON.stringify({image_url: imageUrl, prompt: motionPrompt, num_frames: 81, resolution: "480p", num_inference_steps: 20}),
  });
  if (!submitRes.ok) {
    const err = await submitRes.json().catch(() => ({}));
    throw new Error(err.detail || `Error ${submitRes.status}`);
  }
  const {request_id} = await submitRes.json();
  if (!request_id) throw new Error("No se recibió request_id de fal.ai");
  const pollUrl = `https://queue.fal.run/fal-ai/wan/v2.1/1.3b/image-to-video/requests/${request_id}`;
  for (let i = 0; i < 72; i++) {
    await new Promise(r => setTimeout(r, 2500));
    const pollRes = await fetch(pollUrl, {headers: {"Authorization": `Key ${falKey}`}});
    const data = await pollRes.json();
    if (data.status === "COMPLETED" && data.output?.video?.url) return data.output.video.url;
    if (data.status === "FAILED") throw new Error("Wan2.1 falló al generar el video");
  }
  throw new Error("Tiempo de espera agotado.");
}

function SettingsPanel({groqKey, setGroqKey, falKey, setFalKey, characters, setCharacters, onClose}) {
  const [gInput, setGInput] = useState("");
  const [fInput, setFInput] = useState("");
  const [settingsTab, setSettingsTab] = useState("keys"); // keys | characters
  const [editingChar, setEditingChar] = useState(null); // null | {id,nombre,emoji,descripcion,referenceUrl,color}
  const [newChar, setNewChar] = useState({nombre:"",emoji:"🐾",descripcion:"",referenceUrl:"",color:"#f472b6"});
  const [showNewForm, setShowNewForm] = useState(false);

  const COLORS = ["#4ade80","#f472b6","#fb923c","#38bdf8","#a78bfa","#facc15","#f87171","#34d399"];

  const saveChar = (char) => {
    if (!char.nombre.trim()) return;
    if (editingChar) {
      setCharacters(cs => cs.map(c => c.id === char.id ? char : c));
      setEditingChar(null);
    } else {
      setCharacters(cs => [...cs, {...char, id: Date.now().toString()}]);
      setNewChar({nombre:"",emoji:"🐾",descripcion:"",referenceUrl:"",color:"#f472b6"});
      setShowNewForm(false);

  const deleteChar = (id) => setCharacters(cs => cs.filter(c => c.id !== id));

      {/* Color picker */}

      <textarea value={char.descripcion} onChange={e=>setChar({...char,descripcion:e.target.value})} placeholder="Descripción detallada del personaje en inglés para los prompts de imagen. Ej: Chibi bunny named Anita, white fluffy body, big blue eyes, pink bow on head, kawaii 2D sticker style..." rows={3} style={{width:"100%",padding:"8px 12px",border:"2px solid #e5e7eb",borderRadius:8,fontSize:11,resize:"none",outline:"none",fontFamily:"sans-serif",marginBottom:8}} />

            </div>
            {/* fal.ai */}
            <div style={{marginBottom:16,padding:14,background:falKey?"#f5f3ff":"#f8fafc",borderRadius:14,border:`2px solid ${falKey?"#c4b5fd":"#e5e7eb"}`}}>

                  <div style={{fontWeight:800,fontSize:13,color:falKey?"#5b21b6":"#374151"}}>⚡ fal.ai · imágenes + videos {falKey?"✅":""}</div>

function usePersisted(key, defaultValue) {
  const [value, setValue] = useState(() => {
    try {
      const saved = localStorage.getItem(key);
      return saved !== null ? JSON.parse(saved) : defaultValue;
    } catch { return defaultValue; }
  });
  const set = (v) => {
    setValue(v);
    try { localStorage.setItem(key, JSON.stringify(v)); } catch {}
  };
  return [value, set];
}

            ? days.map(day => {
                const c = dayColors[day]; const isActive = day===activeDay;
                return <button key={day} onClick={() => {setActiveDay(day);setExpanded(null);}} style={{flexShrink:0,padding:"8px 16px",borderRadius:"50px",border:isActive?`2px solid ${c.accent}`:"2px solid #e5e7eb",background:isActive?c.light:"white",color:isActive?c.dark:"#6b7280",fontWeight:isActive?800:600,fontSize:12,cursor:"pointer",boxShadow:isActive?`0 2px 10px ${c.accent}44`:"none"}}>{day}</button>;
              })
            : specialDates.map((d, i) => {
                const isActive = i===activeDate;
                return <button key={i} onClick={() => {setActiveDate(i);setExpanded(null);}} style={{flexShrink:0,padding:"8px 14px",borderRadius:"50px",border:isActive?`2px solid ${d.color.accent}`:"2px solid #e5e7eb",background:isActive?d.color.light:"white",color:isActive?d.color.dark:"#6b7280",fontWeight:isActive?800:600,fontSize:11,cursor:"pointer"}}>{d.emoji} {d.nombre}</button>;
              })
          }
        </div>
      )}

      {tab==="especial" && (
        <div style={{padding:"10px 16px 0",textAlign:"center"}}>
          <span style={{display:"inline-block",padding:"4px 14px",background:colors.light,color:colors.dark,borderRadius:"50px",fontSize:12,fontWeight:700,border:`1.5px solid ${colors.accent}`}}>
            {specialDates[activeDate].emoji} {specialDates[activeDate].nombre} · {specialDates[activeDate].fecha}
          </span>
        </div>
      )}

      {/* CREATIVE TAB */}
      {tab==="creativo" && <CreativeGenerator groqKey={groqKey} falKey={falKey} characters={characters} />}

      {/* ITEMS LIST */}
      {tab !== "creativo" && (
        <div style={{padding:"14px 16px",display:"flex",flexDirection:"column",gap:10}}>
          {currentItems.map((item, i) => {
            const isOpen = expanded===i;
            const promptKey = `${tab}-${tab==="semanal"?activeDay:activeDate}-${i}`;
            return (
              <div key={i} style={{background:"white",borderRadius:16,border:`2px solid ${isOpen?colors.accent:"#f0f0f0"}`,overflow:"hidden",boxShadow:isOpen?`0 4px 20px ${colors.accent}28`:"0 1px 3px rgba(0,0,0,0.04)",transition:"all 0.25s"}}>
                <button onClick={() => setExpanded(isOpen?null:i)} style={{width:"100%",display:"flex",alignItems:"center",gap:10,padding:"13px 16px",background:"none",border:"none",cursor:"pointer",textAlign:"left"}}>
                  <div style={{background:isOpen?colors.light:"#f9fafb",borderRadius:10,padding:"5px 8px",minWidth:68,textAlign:"center"}}>
                    <div style={{fontSize:10,color:colors.dark,fontWeight:800}}>{item.hora}</div>
                  </div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:700,color:"#111"}}>{item.emoji||""} {item.tipo}</div>
                  </div>
                  <div style={{fontSize:16,color:colors.accent,transform:isOpen?"rotate(180deg)":"rotate(0)",transition:"transform 0.2s"}}>⌄</div>
                </button>

                {isOpen && (
                  <div style={{padding:"0 16px 16px"}}>
                    <div style={{fontSize:11,fontWeight:700,color:"#6b7280",marginBottom:6,textTransform:"uppercase",letterSpacing:0.5}}>🎨 Prompt de imagen</div>
                    <div style={{background:colors.bg,border:`1.5px dashed ${colors.accent}`,borderRadius:10,padding:12,fontSize:11,color:"#374151",lineHeight:1.65,fontFamily:"monospace"}}>
                      {item.prompt}
                    </div>
                    <button onClick={() => copyPrompt(item.prompt, promptKey)} style={{marginTop:8,width:"100%",padding:9,background:copiedPrompt===promptKey?colors.accent:colors.light,color:copiedPrompt===promptKey?"white":colors.dark,border:"none",borderRadius:8,fontWeight:700,fontSize:12,cursor:"pointer",transition:"all 0.2s"}}>
                      {copiedPrompt===promptKey?"✅ ¡Copiado!":"📋 Copiar prompt de imagen"}
                    </button>

                    <div style={{height:1,background:"#f0f0f0",margin:"12px 0"}} />

                    {/* Image generation */}
                    <div style={{fontSize:11,fontWeight:700,color:"#6b7280",marginBottom:6,textTransform:"uppercase",letterSpacing:0.5}}>🖼️ Generar imagen directamente</div>
                    <ImageCard prompt={item.prompt} falKey={falKey} referenceUrl={characters.find(c=>c.id==="lito")?.referenceUrl || ""} />

                    <div style={{height:1,background:"#f0f0f0",margin:"12px 0"}} />

                    <div style={{fontSize:11,fontWeight:700,color:"#6b7280",marginBottom:4,textTransform:"uppercase",letterSpacing:0.5}}>✨ Frases hook (Groq · gratis)</div>
                    <HookPanel tipo={item.tipo} dia={tab==="semanal"?activeDay:specialDates[activeDate].nombre} promptImagen={item.prompt} colors={colors} groqKey={groqKey} />
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

      {/* SETTINGS MODAL */}
      {showSettings && <SettingsPanel groqKey={groqKey} setGroqKey={setGroqKey} falKey={falKey} setFalKey={setFalKey} characters={characters} setCharacters={setCharacters} onClose={() => setShowSettings(false)} />}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

<!-- Service Worker: permite instalar como app y funcionar offline -->
<script>
if ("serviceWorker" in navigator) {
  const swCode = `
    const CACHE = "lito-studio-v1";
    const ASSETS = ["./"];
    self.addEventListener("install", e => {
      e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS)));
      self.skipWaiting();
    });
    self.addEventListener("activate", e => {
      e.waitUntil(caches.keys().then(keys =>
        Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
      ));
      self.clients.claim();
    });
    self.addEventListener("fetch", e => {
      e.respondWith(
        fetch(e.request).catch(() => caches.match(e.request))
      );
    });
  `;
  const blob = new Blob([swCode], {type: "application/javascript"});
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(() => {});
}
</script>
