const manifest = {

  orientation: "portrait",
  background_color: "#0f0817",
  theme_color: "#7c3aed",
  icons: [
    { src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' rx='112' fill='%237c3aed'/><text x='256' y='380' font-size='320' text-anchor='middle'>🫧</text></svg>", sizes: "512x512", type: "image/svg+xml", purpose: "any maskable" },
    { src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' rx='42' fill='%237c3aed'/><text x='96' y='142' font-size='120' text-anchor='middle'>🫧</text></svg>", sizes: "192x192", type: "image/svg+xml", purpose: "any maskable" }

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Bricolage+Grotesque:wght@500;700;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet"/>

<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<style>
:root {
  --bg: #0f0817;
  --bg-2: #150a23;
  --surface: #1a1225;
  --surface-2: #241834;
  --border: #2d1f3d;
  --border-2: #3d2c52;
  --text: #fff;
  --text-2: #c4b8d6;
  --muted: #8a7a9e;
  --purple: #a855f7;
  --purple-2: #c084fc;
  --pink: #ec4899;
  --grad: linear-gradient(135deg, #7c3aed 0%, #c026d3 100%);
  --grad-2: linear-gradient(135deg, #ec4899 0%, #f59e0b 100%);
  --grad-3: linear-gradient(135deg, #06b6d4 0%, #8b5cf6 100%);
  --green: #4ade80;
  --amber: #fbbf24;
  --danger: #f87171;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --font-display: 'Bricolage Grotesque', system-ui, sans-serif;
  --font-body: 'Plus Jakarta Sans', -apple-system, system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}

input, textarea, select {
  -webkit-user-select: text;
  user-select: text;
}

html {
  font-size: 16px;
  -webkit-text-size-adjust: 100%;
}

html, body {
  height: 100%;
  height: 100dvh;
  overflow: hidden;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 15px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  position: fixed;
  inset: 0;
  width: 100%;
  overscroll-behavior: none;
}

#root {
  height: 100dvh;
  display: flex;
  flex-direction: column;
}

button, input, textarea, select {
  font-family: inherit;
  color: inherit;
  font-size: inherit;
}

textarea { resize: none; }

button {
  cursor: pointer;
  background: none;
  border: none;
  color: inherit;
}

::-webkit-scrollbar { display: none; width: 0; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
@keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-4px); }
}

/* HEADER */
.app-header {
  height: calc(56px + var(--safe-top));
  padding-top: var(--safe-top);
  display: flex;
  align-items: center;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  z-index: 50;
}

.header-content {
  height: 56px;
  width: 100%;
  display: flex;
  align-items: center;
  padding: 0 14px;
  gap: 10px;
}

.brand-mini {
  display: flex;
  align-items: center;
  gap: 10px;
  flex: 1;
  min-width: 0;
}

.brand-icon {
  font-size: 26px;
  filter: drop-shadow(0 2px 4px rgba(168, 85, 247, 0.4));
}

.brand-text {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 19px;
  letter-spacing: -0.02em;
  background: var(--grad);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  white-space: nowrap;
}

.tab-subtitle {
  font-size: 11px;
  color: var(--muted);
  font-weight: 500;
  margin-top: -2px;
  letter-spacing: 0.02em;
}

.icon-btn {
  width: 40px;
  height: 40px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text);
  flex-shrink: 0;
  transition: background 0.15s;
}

.icon-btn:active { background: var(--surface); }

.status-pill {
  padding: 5px 10px;
  border-radius: 100px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.04em;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  flex-shrink: 0;
}

.status-pill.online {
  background: rgba(74, 222, 128, 0.12);
  border: 1px solid rgba(74, 222, 128, 0.3);
  color: var(--green);
}

.status-pill.offline {
  background: rgba(248, 113, 113, 0.12);
  border: 1px solid rgba(248, 113, 113, 0.3);
  color: var(--danger);
}

.status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: currentColor;
  box-shadow: 0 0 6px currentColor;
}

/* MAIN */
.main {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
  padding-bottom: calc(72px + var(--safe-bottom));
}

.tab-content {
  padding: 16px;
  max-width: 760px;
  margin: 0 auto;
  animation: fadeIn 0.3s ease-out;
}

/* HERO SECTION (top of each tab) */
.tab-hero {
  margin-bottom: 20px;
  padding: 20px;
  border-radius: 20px;
  position: relative;
  overflow: hidden;
}

.tab-hero.charco {
  background: linear-gradient(135deg, #4a1a4f 0%, #1a0a23 100%);
  border: 1px solid rgba(192, 38, 211, 0.3);
}

.tab-hero.meilin {
  background: linear-gradient(135deg, #1a3a5f 0%, #0a1a2e 100%);
  border: 1px solid rgba(6, 182, 212, 0.3);
}

.tab-hero.imagen {
  background: linear-gradient(135deg, #4a1f1a 0%, #2a1015 100%);
  border: 1px solid rgba(245, 158, 11, 0.3);
}

.tab-hero.video {
  background: linear-gradient(135deg, #1a4a3a 0%, #0a2a20 100%);
  border: 1px solid rgba(74, 222, 128, 0.3);
}

.tab-hero::before {
  content: '';
  position: absolute;
  top: -50%;
  right: -20%;
  width: 200px;
  height: 200px;
  background: radial-gradient(circle, rgba(168, 85, 247, 0.2) 0%, transparent 70%);
  pointer-events: none;
}

.hero-emoji {
  font-size: 32px;
  margin-bottom: 10px;
  display: inline-block;
  animation: float 3s ease-in-out infinite;
}

.hero-title {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 24px;
  letter-spacing: -0.02em;
  margin-bottom: 6px;
  line-height: 1.1;
}

.hero-subtitle {
  font-size: 13px;
  color: var(--text-2);
  line-height: 1.5;
  max-width: 90%;
}

/* CARDS */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 12px;
}

.card-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.card-title .req {
  color: var(--pink);
  font-size: 14px;
  margin-left: 2px;
}

/* CHIPS */
.chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.chip {
  padding: 8px 12px;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: 100px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-2);
  transition: all 0.15s;
  display: inline-flex;
  align-items: center;
  gap: 5px;
}

.chip:active {
  transform: scale(0.96);
}

.chip.selected {
  background: var(--grad);
  border-color: transparent;
  color: white;
  font-weight: 600;
  box-shadow: 0 4px 12px rgba(124, 58, 237, 0.3);
}

/* SELECT GRID */
.select-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
}

.select-card {
  padding: 12px 10px;
  background: var(--bg-2);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  text-align: center;
  transition: all 0.15s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}

.select-card:active { transform: scale(0.97); }

.select-card.selected {
  border-color: var(--purple);
  background: rgba(168, 85, 247, 0.1);
}

.select-card-icon { font-size: 22px; }

.select-card-label {
  font-size: 12px;
  font-weight: 600;
  line-height: 1.2;
}

.select-card-desc {
  font-size: 10px;
  color: var(--muted);
  line-height: 1.3;
}

/* INPUT */
.input-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.input-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-2);
}

.input-field {
  width: 100%;
  padding: 12px 14px;
  background: var(--bg-2);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  font-size: 14px;
  color: var(--text);
  transition: border-color 0.15s;
}

.input-field:focus {
  outline: none;
  border-color: var(--purple);
}

.textarea-field {
  min-height: 80px;
  font-family: inherit;
  line-height: 1.5;
}

.input-help {
  font-size: 11px;
  color: var(--muted);
  margin-top: 4px;
}

/* GENERATE BUTTON */
.generate-btn {
  width: 100%;
  padding: 16px;
  background: var(--grad);
  border-radius: 14px;
  color: white;
  font-weight: 700;
  font-size: 15px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  position: relative;
  overflow: hidden;
  box-shadow: 0 4px 16px rgba(124, 58, 237, 0.4);
  transition: all 0.15s;
}

.generate-btn:active:not(:disabled) {
  transform: scale(0.98);
}

.generate-btn:disabled {
  opacity: 0.4;
  background: var(--surface-2);
  box-shadow: none;
}

.generate-btn.streaming {
  background-size: 200% 100%;
  animation: shimmer 2s infinite;
  background-image: linear-gradient(90deg, var(--purple) 0%, var(--pink) 50%, var(--purple) 100%);
}

.spinner {
  width: 18px;
  height: 18px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* RESULT CARD */
.result-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 12px;
  animation: fadeIn 0.4s ease-out;
}

.result-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
  gap: 10px;
}

.result-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.viral-score {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 10px;
  border-radius: 100px;
  font-size: 11px;
  font-weight: 700;
  font-family: var(--font-mono);
}

.viral-score.high { background: rgba(74, 222, 128, 0.15); color: var(--green); }
.viral-score.mid { background: rgba(251, 191, 36, 0.15); color: var(--amber); }
.viral-score.low { background: rgba(248, 113, 113, 0.15); color: var(--danger); }

.result-actions {
  display: flex;
  gap: 6px;
}

.action-btn {
  width: 32px;
  height: 32px;
  border-radius: 10px;
  background: var(--bg-2);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-2);
  transition: all 0.15s;
}

.action-btn:active {
  background: var(--surface-2);
  transform: scale(0.92);
}

.action-btn.saved { color: var(--amber); }

.result-section {
  margin-bottom: 14px;
}

.result-section:last-child { margin-bottom: 0; }

.result-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.copy-mini {
  font-size: 10px;
  color: var(--purple-2);
  font-weight: 600;
  letter-spacing: 0.05em;
  cursor: pointer;
}

.copy-mini:active { color: var(--purple); }

.result-text {
  background: var(--bg-2);
  border-radius: 10px;
  padding: 12px;
  font-size: 13.5px;
  line-height: 1.6;
  white-space: pre-wrap;
  word-wrap: break-word;
}

.result-text.dialog {
  font-family: var(--font-mono);
  font-size: 12.5px;
}

.result-text.frase {
  font-family: var(--font-display);
  font-size: 17px;
  font-weight: 700;
  text-align: center;
  padding: 18px 14px;
  letter-spacing: -0.01em;
  line-height: 1.3;
}

.hashtags {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}

.hashtag {
  font-size: 11px;
  color: var(--purple-2);
  background: rgba(168, 85, 247, 0.1);
  padding: 3px 8px;
  border-radius: 6px;
  font-weight: 500;
}

.cost-badge {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--muted);
  font-weight: 500;
}

/* VARIATIONS */
.variations {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.variation {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px;
  position: relative;
  transition: all 0.15s;
}

.variation:active { border-color: var(--border-2); }

.variation-num {
  position: absolute;
  top: 10px;
  right: 12px;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--muted);
  font-weight: 600;
}

.variation-text {
  font-family: var(--font-display);
  font-size: 15px;
  font-weight: 600;
  line-height: 1.35;
  margin-right: 24px;
  margin-bottom: 8px;
}

.variation-actions {
  display: flex;
  gap: 6px;
  align-items: center;
}

.variation-action {
  font-size: 11px;
  color: var(--purple-2);
  font-weight: 600;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}

/* EMPTY STATES */
.empty-state {
  text-align: center;
  padding: 40px 20px;
}

.empty-icon {
  font-size: 48px;
  margin-bottom: 12px;
  opacity: 0.5;
}

.empty-title {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 18px;
  margin-bottom: 6px;
}

.empty-desc {
  font-size: 13px;
  color: var(--muted);
  line-height: 1.5;
}

/* BOTTOM NAV */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--bg);
  border-top: 1px solid var(--border);
  display: flex;
  z-index: 100;
  padding-bottom: var(--safe-bottom);
  backdrop-filter: blur(20px);
  background: rgba(15, 8, 23, 0.92);
}

.nav-tab {
  flex: 1;
  padding: 9px 0 8px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  color: var(--muted);
  position: relative;
  transition: color 0.15s;
}

.nav-tab.active {
  color: var(--text);
}

.nav-tab-icon {
  font-size: 20px;
  transition: transform 0.2s;
}

.nav-tab.active .nav-tab-icon {
  transform: scale(1.1);
}

.nav-tab-label {
  font-size: 9.5px;
  font-weight: 700;
  letter-spacing: 0.02em;
}

.nav-tab.active::before {
  content: '';
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 28px;
  height: 3px;
  background: var(--grad);
  border-radius: 0 0 4px 4px;
}

.nav-tab .badge {
  position: absolute;
  top: 4px;
  right: calc(50% - 16px);
  min-width: 16px;
  height: 16px;
  background: var(--pink);
  border-radius: 50px;
  font-size: 9px;
  font-weight: 800;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 4px;
}

.nav-tab .dot {
  position: absolute;
  top: 8px;
  right: calc(50% - 14px);
  width: 8px;
  height: 8px;
  background: var(--amber);
  border-radius: 50%;
}

/* MODAL */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: flex;
  align-items: flex-end;
  justify-content: center;
  z-index: 1000;
  animation: fadeIn 0.2s;
  backdrop-filter: blur(6px);
}

.modal {
  background: var(--bg-2);
  border-top: 1px solid var(--border);
  border-radius: 24px 24px 0 0;
  width: 100%;
  max-width: 540px;
  max-height: 92dvh;
  display: flex;
  flex-direction: column;
  animation: slideUp 0.3s cubic-bezier(0.32, 0.72, 0, 1);
  padding-bottom: var(--safe-bottom);
}

.modal-handle {
  width: 36px;
  height: 4px;
  background: var(--border-2);
  border-radius: 2px;
  margin: 8px auto 4px;
  flex-shrink: 0;
}

.modal-header {
  padding: 12px 20px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
}

.modal-title {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 22px;
  letter-spacing: -0.02em;
}

.modal-close {
  width: 36px;
  height: 36px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--muted);
}

.modal-close:active {
  background: var(--surface);
  color: var(--text);
}

.modal-body {
  padding: 20px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  flex: 1;
}

.modal-section { margin-bottom: 22px; }
.modal-section:last-child { margin-bottom: 0; }

.toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  gap: 12px;
}

.toggle-info { flex: 1; }

.toggle-label {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 3px;
}

.toggle-desc {
  font-size: 12px;
  color: var(--muted);
  line-height: 1.4;
}

.toggle-switch {

// ─── HELPERS ────────────────────────────────────────────────────────────────

function loadStored(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
  catch { return fallback; }
}

function saveStored(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) {}
}

function usePersisted(key, defaultValue) {
  const [value, setValue] = useState(() => loadStored(key, defaultValue));
  const set = useCallback(v => {
    const newVal = typeof v === "function" ? v(loadStored(key, defaultValue)) : v;
    saveStored(key, newVal);
    setValue(newVal);
  }, [key]);
  return [value, set];
}

// Costos por modelo Haiku 4.5: $1/$5 + cache: $1.25 write, $0.10 read
function calcCost(usage) {
  if (!usage) return 0;
  return (
    (usage.input_tokens || 0) / 1e6 * 1.0 +
    (usage.output_tokens || 0) / 1e6 * 5.0 +
    (usage.cache_creation_input_tokens || 0) / 1e6 * 1.25 +
    (usage.cache_read_input_tokens || 0) / 1e6 * 0.10
  );
}

function formatCost(c) {
  if (c < 0.0001) return "$" + c.toFixed(6);
  if (c < 0.01) return "$" + c.toFixed(5);
  if (c < 1) return "$" + c.toFixed(4);
  return "$" + c.toFixed(2);
}

function viralColor(score) {
  if (score >= 8) return "high";
  if (score >= 5) return "mid";
  return "low";
}

async function callClaude(apiKey, system, userPrompt, useCache = false, jsonMode = true) {
  const requestBody = {
    model: "claude-haiku-4-5",
    max_tokens: 2048,
    messages: [{ role: "user", content: userPrompt }]
  };

  if (system) {
    if (useCache) {
      requestBody.system = [
        { type: "text", text: system, cache_control: { type: "ephemeral" } }
      ];
    } else {
      requestBody.system = system;
    }
  }

  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "content-type": "application/json",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify(requestBody)
  });

  if (!response.ok) {
    const err = await response.json().catch(() => ({ error: { message: "Error desconocido" } }));
    throw new Error(err.error?.message || `HTTP ${response.status}`);
  }

  const data = await response.json();
  const text = data.content[0]?.text || "";
  const cost = calcCost(data.usage);

  if (jsonMode) {
    try {
      const cleanText = text.replace(/^```json\s*/, "").replace(/```\s*$/, "").trim();
      return { data: JSON.parse(cleanText), cost, usage: data.usage };
    } catch (e) {
      return { data: { error: "Parse error", raw: text }, cost, usage: data.usage };
    }
  }

  return { data: text, cost, usage: data.usage };
}

        )
      ),
      h("div", { className: "result-section" },
        h("div", { className: "result-label" }, "📱 Caption",

      ),
      h("div", { className: "result-section" },

}

// ─── GUARDADAS TAB ──────────────────────────────────────────────────────────

function GuardadasTab({ savedIdeas, setSavedIdeas, onToast }) {
  const [filter, setFilter] = useState("todas");
  
  const filtered = useMemo(() => {
    if (filter === "todas") return savedIdeas;
    return savedIdeas.filter(i => i.tipo === filter);
  }, [savedIdeas, filter]);

  const remove = (id) => {
    if (!confirm("¿Eliminar?")) return;
    setSavedIdeas(savedIdeas.filter(i => i.id !== id));
    onToast("Eliminado");
  };

  const copy = (text, label) => {
    navigator.clipboard.writeText(text);
    onToast(`${label} copiado`);
  };

  const labelTipo = (t) => ({
    charco: "🎤 Charco",
    meilin: "💎 Mei Lin",
    imagen: "🎨 Imagen",
    video: "🎬 Video"
  })[t] || t;

  return h("div", { className: "tab-content" },
    h("div", { className: "tab-hero", style: { background: "linear-gradient(135deg, #4a3a1a 0%, #2a1f0a 100%)", borderColor: "rgba(251, 191, 36, 0.3)" } },
      h("div", { className: "hero-emoji" }, "⭐"),
      h("h1", { className: "hero-title" }, "Guardadas"),
      h("p", { className: "hero-subtitle" }, savedIdeas.length === 0 ? "Aún no tienes ideas guardadas." : `${savedIdeas.length} ideas guardadas`)
    ),

    h("div", { className: "card" },
      h("div", { className: "chips" },
        h("button", { className: "chip" + (filter === "todas" ? " selected" : ""), onClick: () => setFilter("todas") }, "Todas (" + savedIdeas.length + ")"),
        h("button", { className: "chip" + (filter === "charco" ? " selected" : ""), onClick: () => setFilter("charco") }, "🎤 Charco"),
        h("button", { className: "chip" + (filter === "meilin" ? " selected" : ""), onClick: () => setFilter("meilin") }, "💎 Mei Lin"),
        h("button", { className: "chip" + (filter === "imagen" ? " selected" : ""), onClick: () => setFilter("imagen") }, "🎨 Imagen"),
        h("button", { className: "chip" + (filter === "video" ? " selected" : ""), onClick: () => setFilter("video") }, "🎬 Video")
      )
    ),

    filtered.length === 0 ? 
      h("div", { className: "empty-state" },
        h("div", { className: "empty-icon" }, "📭"),
        h("div", { className: "empty-title" }, "No hay nada aquí"),
        h("div", { className: "empty-desc" }, "Guarda tus ideas favoritas con la estrella ⭐")
      )
    : filtered.map(item =>
      h("div", { key: item.id, className: "result-card" },
        h("div", { className: "result-header" },
          h("div", { className: "result-meta" },
            h("div", { style: { fontSize: 11, color: "var(--purple-2)", fontWeight: 700 } }, labelTipo(item.tipo)),
            h("div", { style: { fontSize: 10, color: "var(--muted)", fontFamily: "var(--font-mono)" } }, new Date(item.fecha).toLocaleDateString())
          ),
          h("button", { className: "action-btn", onClick: () => remove(item.id) }, h(Icon.Trash))
        ),
        h("div", { style: { fontFamily: "var(--font-display)", fontSize: 15, fontWeight: 700, marginBottom: 10 } }, item.titulo),
        item.tipo === "meilin" && h("div", { className: "result-text frase" }, `"${item.contenido.frase}"`),
        item.tipo === "charco" && h("div", { className: "result-text", style: { fontSize: 12 } }, item.contenido.hook),
        item.tipo === "imagen" && h(React.Fragment, null,
          h("div", { className: "result-text dialog", style: { fontSize: 11.5 } }, item.contenido.prompt_imagen),
          h("div", { style: { marginTop: 8 } },
            h("button", { className: "chip", onClick: () => copy(item.contenido.prompt_imagen, "Prompt") }, h(Icon.Copy), " Copiar prompt")
          )
        ),
        item.tipo === "video" && h("div", { className: "result-text", style: { fontSize: 12 } }, item.contenido.hook)
      )
    )
  );
}

// ─── CONFIG TAB ─────────────────────────────────────────────────────────────

    h("div", { className: "tab-hero", style: { background: "linear-gradient(135deg, #2a1f3d 0%, #1a0f25 100%)" } },
      h("div", { className: "hero-emoji" }, "⚙️"),
      h("h1", { className: "hero-title" }, "Configuración"),

    h("div", { className: "card" },

    ),

    h("div", { className: "card" },
      h("div", { className: "card-title" }, "🎤 Personalidad de Lito"),
      h("textarea", {
        className: "input-field textarea-field",

      h("div", { className: "input-help" }, "Define cómo habla, su tono, su origen, sus muletillas. Más detalle = mejores guiones.")

      h("div", { className: "input-help" }, "Su esencia, su forma de hablar, qué transmite. Influye en el tipo de frases generadas.")

    h("div", { className: "card", style: { borderColor: "rgba(74, 222, 128, 0.3)" } },
      h("div", { className: "card-title" }, "💰 Ahorros"),
      h("div", { className: "toggle-row" },
        h("div", { className: "toggle-info" },
          h("div", { className: "toggle-label" }, "Prompt Caching"),
          h("div", { className: "toggle-desc" }, "Cachea las instrucciones del sistema, ahorra ~85% en consultas repetidas del mismo tipo")
        ),

// ─── BOTTOM NAV ─────────────────────────────────────────────────────────────

function BottomNav({ active, onChange, savedCount, hasKey }) {
  const tabs = [
    { id: "charco", icon: "🎤", label: "Charco" },
    { id: "meilin", icon: "💎", label: "Mei Lin" },
    { id: "imagen", icon: "🎨", label: "Imagen" },
    { id: "video", icon: "🎬", label: "Video" },
    { id: "guardadas", icon: "⭐", label: "Saved", badge: savedCount > 0 ? savedCount : null },
    { id: "config", icon: "⚙️", label: "Config", dot: !hasKey }
  ];

  return h("nav", { className: "bottom-nav" },
    tabs.map(t =>
      h("button", {
        key: t.id,
        className: "nav-tab" + (active === t.id ? " active" : ""),
        onClick: () => onChange(t.id)
      },
        h("span", { className: "nav-tab-icon" }, t.icon),
        h("span", { className: "nav-tab-label" }, t.label),
        t.badge && h("span", { className: "badge" }, t.badge > 99 ? "99+" : t.badge),
        t.dot && h("span", { className: "dot" })
      )
    )
  );
}

// ─── APP ────────────────────────────────────────────────────────────────────

function App() {
  const [tab, setTab] = usePersisted("lito_tab", "charco");
  const [apiKey, setApiKey] = usePersisted("lito_api_key", "");
  const [useCache, setUseCache] = usePersisted("lito_use_cache", true);
  const [characters, setCharacters] = usePersisted("lito_characters", {
    lito: "Lito es un chismoso experto, divertido, observador. Habla con energía mexicana, hace pausas dramáticas y reacciones exageradas. Picante pero sin caer en lo vulgar. Su frase distintiva es algo así como '¿estás listo para esto?'.",
    meilin: "Mei Lin es una mujer hermosa, etérea, con presencia magnética. Habla con calma pero cada palabra impacta. Su mirada profunda y voz suave hacen que cada frase pegue como verdad universal."
  });
  const [savedIdeas, setSavedIdeas] = usePersisted("lito_saved", []);
  const [totalCost, setTotalCost] = usePersisted("lito_total_cost", 0);
  const [totalGenerations, setTotalGenerations] = usePersisted("lito_total_gens", 0);
  const [toast, setToast] = useState(null);

  // Wrap setSavedIdeas to track total cost when adding from generation
  const trackSavedIdeas = useCallback((newIdeas) => {
    setSavedIdeas(newIdeas);
  }, [setSavedIdeas]);

  // Track cost from generations (called from each tab)
  const trackGeneration = useCallback((cost) => {
    setTotalCost(prev => prev + cost);
    setTotalGenerations(prev => prev + 1);
  }, [setTotalCost, setTotalGenerations]);

  const tabSubtitles = {
    charco: "🎤 Charco Sucio · Podcast con Lito",
    meilin: "💎 Mei Lin · Frases impactantes",
    imagen: "🎨 Generador de imágenes virales",
    video: "🎬 Guiones para video",
    guardadas: "⭐ Mis ideas guardadas",
    config: "⚙️ Configuración"
  };

  const handleClearAll = useCallback(() => {
    setSavedIdeas([]);
    setToast("Todas las ideas eliminadas");
  }, [setSavedIdeas]);

  return h(React.Fragment, null,
    h("header", { className: "app-header" },
      h("div", { className: "header-content" },
        h("div", { className: "brand-mini" },
          h("span", { className: "brand-icon" }, "🫧"),
          h("div", null,
            h("div", { className: "brand-text" }, "Lito Studio"),
            h("div", { className: "tab-subtitle" }, tabSubtitles[tab])
          )
        ),
        apiKey 
          ? h("div", { className: "status-pill online" }, h("span", { className: "status-dot" }), "Conectado")
          : h("div", { className: "status-pill offline" }, h("span", { className: "status-dot" }), "Sin API key")
      )
    ),

    h("main", { className: "main" },
      tab === "charco" && h(CharcoTab, { apiKey, useCache, characters, savedIdeas, setSavedIdeas: trackSavedIdeas, onToast: setToast }),
      tab === "meilin" && h(MeiLinTab, { apiKey, useCache, characters, savedIdeas, setSavedIdeas: trackSavedIdeas, onToast: setToast }),
      tab === "imagen" && h(ImagenTab, { apiKey, useCache, savedIdeas, setSavedIdeas: trackSavedIdeas, onToast: setToast }),
      tab === "video" && h(VideoTab, { apiKey, useCache, savedIdeas, setSavedIdeas: trackSavedIdeas, onToast: setToast }),
      tab === "guardadas" && h(GuardadasTab, { savedIdeas, setSavedIdeas: trackSavedIdeas, onToast: setToast }),
      tab === "config" && h(ConfigTab, { apiKey, setApiKey, useCache, setUseCache, characters, setCharacters, totalCost, totalGenerations, onClearAll: handleClearAll })
    ),

    h(BottomNav, { active: tab, onChange: setTab, savedCount: savedIdeas.length, hasKey: !!apiKey }),
    h(Toast, { message: toast, onClose: () => setToast(null) })
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>

<script>
if ("serviceWorker" in navigator) {
  const swCode = `
    const CACHE = "lito-studio-v3";
    self.addEventListener("install", e => { e.waitUntil(caches.open(CACHE).then(c => c.addAll(["./"]))); self.skipWaiting(); });
    self.addEventListener("activate", e => { e.waitUntil(caches.keys().then(keys => Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k))))); self.clients.claim(); });
    self.addEventListener("fetch", e => {
      if (e.request.url.includes("api.anthropic.com")) return;
      e.respondWith(fetch(e.request).then(res => {
        if (e.request.method === "GET" && res.ok) {
          const clone = res.clone();
          caches.open(CACHE).then(c => c.put(e.request, clone));
        }
        return res;
      }).catch(() => caches.match(e.request)));
    });
  `;
  const swBlob = new Blob([swCode], { type: "application/javascript" });
  navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(() => {});
}
</script>
