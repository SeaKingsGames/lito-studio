function usePersisted(key,def){
  const [v,setV]=useState(()=>{try{const s=localStorage.getItem(key);return s!==null?JSON.parse(s):def;}catch{return def;}});
  const set=useCallback(val=>{setV(val);try{localStorage.setItem(key,JSON.stringify(val));}catch{}},[key]);
  return [v,set];
}

const Btn=({children,onClick,disabled,variant="primary",style={}}={})=>{
  const base={padding:"12px 18px",borderRadius:12,fontWeight:700,fontSize:13,cursor:disabled?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6,transition:"all 0.15s",opacity:disabled?0.5:1,border:"none"};
  const v={
    primary:{background:C.grad,color:"#fff",boxShadow:"0 4px 20px #7c3aed44"},
    secondary:{background:C.card,color:C.text,border:`1.5px solid ${C.border}`},
    ghost:{background:"transparent",color:C.muted,border:`1.5px solid ${C.border}`},
    success:{background:"linear-gradient(135deg,#059669,#10b981)",color:"#fff"},
    danger:{background:"linear-gradient(135deg,#dc2626,#f97316)",color:"#fff"},
  };
  return <button onClick={onClick} disabled={disabled} style={{...base,...v[variant],...style}}>{children}</button>;
};

// ─── FAL FILE UPLOAD (para imágenes locales) ──────────────────────────────────
async function uploadToFal(falKey, base64DataUrl) {
  // Convertir base64 a blob
  const res = await fetch(base64DataUrl);
  const blob = await res.blob();
  const form = new FormData();
  form.append("file", blob, "reference.png");
  const r = await fetch("https://fal.run/files/upload", {
    method:"POST",
    headers:{"Authorization":`Key ${falKey}`},
    body:form,
  });
  if (!r.ok) throw new Error("No se pudo subir la imagen de referencia");
  const d = await r.json();
  return d.url || d.file_url || d.access_url;
}

async function callGroq(key,sys,usr){
  const r=await fetch("https://api.groq.com/openai/v1/chat/completions",{method:"POST",headers:{"Authorization":`Bearer ${key}`,"Content-Type":"application/json"},body:JSON.stringify({model:"llama-3.3-70b-versatile",messages:[{role:"system",content:sys},{role:"user",content:usr}],max_tokens:1000,temperature:0.9})});
  if(!r.ok){const e=await r.json().catch(()=>{});throw new Error(e?.error?.message||`Groq HTTP ${r.status}`);}
  return (await r.json()).choices?.[0]?.message?.content||"";
}
async function genHooks(key,tipo,dia,prompt){
  const t=await callGroq(key,"Experto contenido viral Facebook español latino. Genera frases hook para posts de memes con Lito (ajolotito chibi). Frases: español coloquial, 5-20 palabras, incitan comentar/etiquetar/compartir, con emojis, muy relatable. Responde SOLO JSON array 5 strings sin markdown.",`Día: ${dia}\nTipo: ${tipo}\nContexto: ${prompt.slice(0,150)}\n5 frases hook virales.`);
  return JSON.parse(t.replace(/```json|```/g,"").trim());
}

async function genImage(falKey, prompt, refUrl, serviceId="flux_schnell", aspectRatio="square_hd") {
  const svc = IMG_SERVICES.find(s=>s.id===serviceId) || IMG_SERVICES[0];

  // img2img si hay referencia (siempre usa flux/dev/image-to-image)
  if (refUrl) {
    try {
      // Si es base64, subir a fal primero
      let imgUrl = refUrl;
      if (refUrl.startsWith("data:")) { imgUrl = await uploadToFal(falKey, refUrl); }
      const r = await fetch(svc.img2img, {
        method:"POST",
        headers:{"Authorization":`Key ${falKey}`,"Content-Type":"application/json"},
        body:JSON.stringify({image_url:imgUrl, prompt:prompt.slice(0,600), strength:0.60, num_inference_steps:25, guidance_scale:3.5, image_size:aspectRatio}),
      });
      if(r.ok){const d=await r.json();const u=d.images?.[0]?.url;if(u)return u;}
    } catch(e){ console.warn("img2img falló, usando text2img",e); }
  }

  // text2img con el servicio seleccionado
  const body = {prompt:prompt.slice(0,500), image_size:aspectRatio, num_images:1, num_inference_steps:svc.steps};
  const r = await fetch(svc.endpoint, {
    method:"POST",
    headers:{"Authorization":`Key ${falKey}`,"Content-Type":"application/json"},
    body:JSON.stringify(body),
  });
  if(!r.ok){const e=await r.json().catch(()=>{});throw new Error(e?.detail||e?.message||`HTTP ${r.status}`);}
  const d=await r.json();
  const u=d.images?.[0]?.url;
  if(!u)throw new Error("fal.ai no devolvió imagen");
  return u;
}

async function genVideo(falKey, imageUrl, serviceId="wan_1_3b", durationId="81") {
  const svc = VID_SERVICES.find(s=>s.id===serviceId) || VID_SERVICES[0];
  const dur = VID_DURATIONS.find(d=>d.id===durationId) || VID_DURATIONS[1];
  const s=await fetch(`https://queue.fal.run/${svc.model}`,{method:"POST",headers:{"Authorization":`Key ${falKey}`,"Content-Type":"application/json"},body:JSON.stringify({image_url:imageUrl,prompt:"cute chibi character blinking slowly, gills wiggling gently, subtle breathing, smooth looping 2D cartoon animation",num_frames:dur.frames,resolution:"480p",num_inference_steps:20})});
  if(!s.ok){const e=await s.json().catch(()=>{});throw new Error(e?.detail||`Error ${s.status}`);}
  const {request_id}=await s.json();if(!request_id)throw new Error("No request_id");
  const url=`https://queue.fal.run/${svc.model}/requests/${request_id}`;
  for(let i=0;i<72;i++){await new Promise(r=>setTimeout(r,2500));const p=await fetch(url,{headers:{"Authorization":`Key ${falKey}`}});const d=await p.json();if(d.status==="COMPLETED"&&d.output?.video?.url)return d.output.video.url;if(d.status==="FAILED")throw new Error(`${svc.label} falló`);}
  throw new Error("Tiempo agotado");
}

// ─── GENERATOR PANEL ─────────────────────────────────────────────────────────
function GeneratorPanel({initialPrompt="",falKey,groqKey,characters}){
  const [prompt,setPrompt]=useState(initialPrompt);
  const [selChars,setSelChars]=useState(characters.slice(0,1).map(c=>c.id));
  // Image options
  const [imgService,setImgService]=useState("flux_schnell");
  const [aspectRatio,setAspectRatio]=useState("square_hd");
  // Video options
  const [vidService,setVidService]=useState("wan_1_3b");
  const [vidDuration,setVidDuration]=useState("81");
  // States
  const [imgSt,setImgSt]=useState("idle");
  const [imgSrc,setImgSrc]=useState(null);
  const [imgErr,setImgErr]=useState("");
  const [imgT,setImgT]=useState(0);
  const [vidSt,setVidSt]=useState("idle");
  const [vidUrl,setVidUrl]=useState(null);
  const [vidErr,setVidErr]=useState("");
  const [vidT,setVidT]=useState(0);
  const [hooks,setHooks]=useState([]);
  const [hooksLoading,setHooksLoading]=useState(false);
  const [hooksErr,setHooksErr]=useState("");
  const [copiedHook,setCopiedHook]=useState(null);

  useEffect(()=>{if(initialPrompt){setPrompt(initialPrompt);setImgSt("idle");setImgSrc(null);setVidSt("idle");setVidUrl(null);setHooks([]);}},[initialPrompt]);

  const activeChars=characters.filter(c=>selChars.includes(c.id));
  const charWithRef=activeChars.find(c=>c.referenceUrl);
  const toggleChar=id=>setSelChars(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);
  const curImgSvc = IMG_SERVICES.find(s=>s.id===imgService)||IMG_SERVICES[0];
  const curVidSvc = VID_SERVICES.find(s=>s.id===vidService)||VID_SERVICES[0];
  const curVidDur = VID_DURATIONS.find(d=>d.id===vidDuration)||VID_DURATIONS[1];

  const buildPrompt=()=>{
    const alreadyHasChar=prompt.includes("Lito")||prompt.includes("axolotl");
    if(alreadyHasChar)return prompt;
    const desc=activeChars.map(c=>c.descripcion).join(". ");
    return desc?desc+". "+prompt:prompt;
  };

  const doImg=async()=>{
    if(!falKey){setImgErr("Agrega tu fal.ai key en ⚙️ Config");setImgSt("error");return;}
    const p=buildPrompt();if(!p.trim()){setImgErr("Escribe un prompt primero");setImgSt("error");return;}
    setImgSt("loading");setImgSrc(null);setImgErr("");setImgT(0);setVidSt("idle");setVidUrl(null);setHooks([]);
    const t=setInterval(()=>setImgT(s=>s+1),1000);
    try{const u=await genImage(falKey,p,charWithRef?.referenceUrl||null,imgService,aspectRatio);setImgSrc(u);setImgSt("done");}
    catch(e){setImgErr(e.message);setImgSt("error");}
    finally{clearInterval(t);}
  };
  const doVid=async()=>{
    if(!falKey||!imgSrc)return;
    setVidSt("loading");setVidUrl(null);setVidErr("");setVidT(0);
    const t=setInterval(()=>setVidT(s=>s+1),1000);
    try{const u=await genVideo(falKey,imgSrc,vidService,vidDuration);setVidUrl(u);setVidSt("done");}
    catch(e){setVidErr(e.message);setVidSt("error");}
    finally{clearInterval(t);}
  };
  const doHooks=async()=>{
    if(!groqKey){setHooksErr("Agrega tu Groq key en ⚙️ Config");return;}
    setHooksLoading(true);setHooksErr("");
    try{const h=await genHooks(groqKey,"Meme","General",prompt);setHooks(h);}
    catch(e){setHooksErr(e.message);}
    setHooksLoading(false);
  };
  const copyHook=(t,i)=>{navigator.clipboard.writeText(t);setCopiedHook(i);setTimeout(()=>setCopiedHook(null),2000);};

  // Selector row component
  const OptionRow=({label,options,value,onChange})=>(
    <div style={{marginBottom:10}}>
      <div style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:0.8,marginBottom:6}}>{label}</div>
      <div style={{display:"flex",gap:6,overflowX:"auto",scrollbarWidth:"none"}}>
        {options.map(o=>{
          const isA=value===o.id;
          return<button key={o.id} onClick={()=>onChange(o.id)} style={{flexShrink:0,padding:"7px 10px",borderRadius:10,fontSize:11,cursor:"pointer",border:`1.5px solid ${isA?C.accent:C.border}`,background:isA?`${C.accent}22`:"transparent",color:isA?"#fff":C.muted,fontWeight:isA?800:600,textAlign:"center",whiteSpace:"nowrap"}}>
            <span style={{fontSize:14}}>{o.emoji}</span><br/>
            <span style={{fontWeight:800}}>{o.label}</span><br/>
            <span style={{fontSize:9,opacity:0.7}}>{o.desc}</span>
          </button>;
        })}
      </div>
    </div>
  );

  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      {/* Characters */}
      {characters.length>0&&(
        <Card>
          <Label>🎭 Personajes</Label>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {characters.map(c=>{const isSel=selChars.includes(c.id);return<button key={c.id} onClick={()=>toggleChar(c.id)} style={{padding:"6px 12px",borderRadius:50,fontSize:12,fontWeight:isSel?800:600,cursor:"pointer",border:`2px solid ${isSel?c.color:C.border}`,background:isSel?`${c.color}22`:"transparent",color:isSel?"#fff":C.muted}}>{c.emoji} {c.nombre}{isSel&&c.referenceUrl?" 🎯":""}</button>;})}
          </div>
          {charWithRef&&<div style={{marginTop:6,fontSize:10,color:C.green}}>🎯 img2img activo con {charWithRef.nombre} · máxima consistencia</div>}
        </Card>
      )}

      {/* Prompt */}
      <Card style={{padding:0,overflow:"hidden"}}>
        <textarea value={prompt} onChange={e=>setPrompt(e.target.value)} placeholder={"Pega o escribe el prompt aquí...\n\nEj: Dead eyes, dragging feet slowly, tiny coffee cup, Monday zombie mode."} rows={6} style={{width:"100%",padding:"14px 16px",background:"transparent",border:"none",color:C.text,fontSize:13,lineHeight:1.6,outline:"none"}}/>
        <div style={{padding:"8px 14px",borderTop:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:10,color:C.muted}}>{prompt.length} chars</span>
          {prompt&&<button onClick={()=>setPrompt("")} style={{fontSize:10,color:C.muted,background:"none",border:"none",cursor:"pointer"}}>Limpiar ✕</button>}
        </div>
      </Card>

      {/* Image Options */}
      <Card>
        <OptionRow label="🖼️ Servicio de imagen" options={IMG_SERVICES} value={imgService} onChange={setImgService}/>
        <OptionRow label="📐 Relación de aspecto" options={ASPECT_RATIOS} value={aspectRatio} onChange={setAspectRatio}/>
        {charWithRef&&<div style={{fontSize:10,color:C.green,padding:"5px 8px",background:"#0a2e1a",borderRadius:8}}>🎯 img2img activo: siempre usa FLUX Dev independiente del servicio seleccionado</div>}
      </Card>

      {/* Generate image button */}
      <Btn onClick={doImg} disabled={imgSt==="loading"||!prompt.trim()} style={{width:"100%",padding:"14px",fontSize:14,fontWeight:900,borderRadius:14}}>
        {imgSt==="loading"
          ?<><span style={{animation:"spin 0.8s linear infinite",display:"inline-block"}}>✦</span> Generando con {curImgSvc.label}... {imgT}s</>
          :<>{curImgSvc.emoji} Generar · {curImgSvc.label} {charWithRef?"(img2img)":""}</>}
      </Btn>

      {imgSt==="error"&&<Card style={{textAlign:"center"}}><div style={{fontSize:20,marginBottom:6}}>⚠️</div><div style={{color:"#f87171",fontSize:12,marginBottom:10}}>{imgErr}</div><Btn onClick={doImg} variant="danger" style={{width:"100%"}}>🔄 Reintentar</Btn></Card>}

      {imgSt==="done"&&imgSrc&&(
        <Card style={{padding:0,overflow:"hidden",animation:"fadeUp 0.3s ease"}}>
          <img src={imgSrc} alt="Lito" style={{width:"100%",display:"block"}}/>
          <div style={{padding:"10px 12px",display:"flex",gap:8}}>
            <a href={imgSrc} target="_blank" rel="noreferrer" style={{flex:1,padding:"10px",textAlign:"center",background:C.grad,color:"white",borderRadius:10,fontWeight:700,fontSize:12,textDecoration:"none",display:"block"}}>⬇️ Guardar imagen</a>
            <button onClick={doImg} style={{padding:"10px 12px",background:C.surface,color:C.muted,border:`1.5px solid ${C.border}`,borderRadius:10,fontWeight:700,fontSize:12,cursor:"pointer"}}>🔄</button>
          </div>

          {/* Video Options + Generate */}
          <div style={{padding:"0 12px 12px",display:"flex",flexDirection:"column",gap:8}}>
            {vidSt==="idle"&&(
              <div>
                <div style={{marginBottom:8}}>
                  <OptionRow label="🎬 Servicio de video" options={VID_SERVICES} value={vidService} onChange={setVidService}/>
                  <OptionRow label="⏱ Duración del video" options={VID_DURATIONS} value={vidDuration} onChange={setVidDuration}/>
                </div>
                <Btn onClick={doVid} variant="secondary" style={{width:"100%"}}>
                  {curVidSvc.emoji} Animar · {curVidSvc.label} · {curVidDur.label} · {curVidSvc.desc}
                </Btn>
              </div>
            )}
            {vidSt==="loading"&&<div style={{padding:"16px",textAlign:"center",background:`${C.accent}11`,borderRadius:12,border:`1px solid ${C.border}`}}><div style={{fontSize:28,animation:"spin 1.5s linear infinite",display:"inline-block",marginBottom:6}}>🫧</div><div style={{fontSize:12,color:C.muted,fontWeight:700}}>{curVidSvc.label} · {curVidDur.label} · ⏱ {vidT}s</div><div style={{fontSize:10,color:C.muted,marginTop:2}}>Wan tarda ~60-120 seg según calidad</div></div>}
            {vidSt==="error"&&<div style={{textAlign:"center"}}><div style={{color:"#f87171",fontSize:11,marginBottom:8}}>{vidErr}</div><Btn onClick={doVid} variant="danger" style={{width:"100%"}}>🔄 Reintentar video</Btn></div>}
            {vidSt==="done"&&vidUrl&&<div style={{animation:"fadeUp 0.3s ease"}}><video src={vidUrl} controls autoPlay loop playsInline style={{width:"100%",borderRadius:10,marginBottom:8}}/><a href={vidUrl} target="_blank" rel="noreferrer" style={{display:"block",padding:"10px",textAlign:"center",background:"linear-gradient(135deg,#059669,#10b981)",color:"white",borderRadius:10,fontWeight:700,fontSize:12,textDecoration:"none"}}>⬇️ Guardar video</a></div>}
          </div>
        </Card>
      )}

      {/* Hooks */}
      {prompt.trim()&&(
        <Card>
          <Label>✨ Frases hook para el post (Groq · gratis)</Label>
          <Btn onClick={doHooks} disabled={hooksLoading} variant={hooksLoading?"ghost":"secondary"} style={{width:"100%",marginBottom:hooks.length?8:0}}>
            {hooksLoading?<><span style={{animation:"spin 0.8s linear infinite",display:"inline-block"}}>✦</span> Generando frases...</>:hooks.length?"🔄 Regenerar frases":"✨ Generar frases hook"}
          </Btn>
          {hooksErr&&<div style={{fontSize:11,color:"#f87171",marginTop:4}}>{hooksErr}</div>}
          {hooks.map((h,i)=><button key={i} onClick={()=>copyHook(h,i)} style={{display:"block",width:"100%",textAlign:"left",padding:"10px 12px",marginTop:6,borderRadius:10,cursor:"pointer",background:copiedHook===i?`${C.accent}33`:C.bg,color:copiedHook===i?"#fff":C.text,border:`1.5px solid ${copiedHook===i?C.accent:C.border}`,fontWeight:600,fontSize:13,lineHeight:1.5}}>{copiedHook===i?"✅ ¡Copiado!":h}</button>)}
        </Card>
      )}
    </div>
  );
}

                  </div>
                  <div style={{display:"flex",gap:8}}>
                    <button onClick={()=>copy(item.prompt,key)} style={{flex:1,padding:"10px",borderRadius:10,border:`1.5px solid ${C.border}`,background:copied===key?`${accent}33`:"transparent",color:copied===key?"#fff":C.muted,fontWeight:700,fontSize:12,cursor:"pointer"}}>
                      {copied===key?"✅ Copiado":"📋 Copiar"}
                    </button>
                    <button onClick={()=>onSend(item.prompt)} style={{flex:1,padding:"10px",borderRadius:10,border:"none",background:C.grad,color:"white",fontWeight:700,fontSize:12,cursor:"pointer"}}>
                      🎨 Crear imagen →
                    </button>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── IA TAB ───────────────────────────────────────────────────────────────────
function IATab({groqKey,onSend}){
  const [characters]=usePersisted("lito_characters",DEFAULT_CHARACTERS);
  const [selChars,setSelChars]=useState(["lito"]);
  const [humor,setHumor]=useState("negro");
  const [format,setFormat]=useState("single");
  const [topic,setTopic]=useState("");
  const [loading,setLoading]=useState(false);
  const [result,setResult]=useState(null);
  const [error,setError]=useState("");
  const [selHook,setSelHook]=useState(null);
  const [copied,setCopied]=useState(null);
  const toggleChar=id=>setSelChars(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);
  const activeChars=characters.filter(c=>selChars.includes(c.id));
  const charsDesc=activeChars.map(c=>`${c.nombre}: ${c.descripcion}`).join("\n");
  const copy=(t,k)=>{navigator.clipboard.writeText(t);setCopied(k);setTimeout(()=>setCopied(null),2000);};

  const generate=async()=>{
    if(!groqKey){setError("Agrega tu Groq key en ⚙️ Config");return;}
    setLoading(true);setResult(null);setError("");setSelHook(null);
    try{const d=await genMemeIA(groqKey,humor,format,topic,charsDesc);setResult(d);}
    catch(e){setError(e.message||"Error generando");}
    setLoading(false);
  };

  const panelKeys=result?["panel1","panel2","panel3"].filter(k=>result[k]):[];
  const hooks=result?[result.frase_hook,result.frase_alternativa].filter(Boolean):[];
  const prompts=result?(panelKeys.length>0?panelKeys.map(k=>result[k].prompt_imagen):[result.prompt_imagen]).filter(Boolean):[];

  return(
    <div style={{padding:"12px 16px",paddingBottom:80,display:"flex",flexDirection:"column",gap:12}}>
      <Card>
        <Label>🎭 Personajes en escena</Label>
        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
          {characters.map(c=>{const isSel=selChars.includes(c.id);return<button key={c.id} onClick={()=>toggleChar(c.id)} style={{padding:"6px 14px",borderRadius:50,fontSize:12,cursor:"pointer",border:`2px solid ${isSel?c.color:C.border}`,background:isSel?`${c.color}22`:"transparent",color:isSel?"#fff":C.muted,fontWeight:isSel?800:600}}>{c.emoji} {c.nombre}</button>;})}
        </div>
      </Card>
      <Card>
        <Label>🎭 Tipo de humor</Label>
        <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8}}>
          {humorTypes.map(h=>{const isA=humor===h.id;return<button key={h.id} onClick={()=>setHumor(h.id)} style={{padding:"6px 12px",borderRadius:50,fontSize:12,cursor:"pointer",border:`2px solid ${isA?"#f97316":C.border}`,background:isA?"#f9731622":"transparent",color:isA?"#fff":C.muted,fontWeight:isA?800:600}}>{h.emoji} {h.label}</button>;})}
        </div>
        <div style={{fontSize:11,color:C.muted,padding:"6px 10px",background:C.bg,borderRadius:8}}>💡 {humorTypes.find(h=>h.id===humor)?.desc}</div>
      </Card>
      <Card>
        <Label>📐 Formato</Label>
        <div style={{display:"flex",gap:8}}>
          {formatTypes.map(f=>{const isA=format===f.id;return<button key={f.id} onClick={()=>setFormat(f.id)} style={{flex:1,padding:"10px 6px",borderRadius:12,textAlign:"center",cursor:"pointer",border:`2px solid ${isA?"#f97316":C.border}`,background:isA?"#f9731622":"transparent",color:isA?"#fff":C.muted,fontWeight:isA?800:600,fontSize:11}}><div style={{fontSize:20,marginBottom:3}}>{f.emoji}</div><div>{f.label}</div></button>;})}
        </div>
      </Card>
      <Card style={{padding:0,overflow:"hidden"}}>
        <input value={topic} onChange={e=>setTopic(e.target.value)} placeholder="Tema específico (opcional)..." style={{width:"100%",padding:"14px 16px",background:"transparent",border:"none",color:C.text,fontSize:13,outline:"none"}}/>
      </Card>
      <Btn onClick={generate} disabled={loading} style={{width:"100%",padding:"15px",fontSize:15,fontWeight:900,borderRadius:14}}>
        {loading?<><span style={{animation:"spin 0.8s linear infinite",display:"inline-block"}}>✦</span> Creando con Groq AI...</>:"🎲 Generar meme con IA (gratis)"}
      </Btn>
      {error&&<Card style={{textAlign:"center"}}><div style={{color:"#f87171",fontSize:12}}>{error}</div></Card>}
      {result&&(
        <div style={{display:"flex",flexDirection:"column",gap:10,animation:"fadeUp 0.3s ease"}}>
          <Card style={{background:"linear-gradient(135deg,#1a0533,#0f0817)"}}>
            <div style={{fontSize:16,fontWeight:900,color:"#fff",marginBottom:4}}>🎯 {result.titulo}</div>
            <div style={{fontSize:12,color:C.muted,lineHeight:1.6}}>{result.concepto}</div>
          </Card>
          {panelKeys.length>0&&(
            <Card>
              <Label>🎬 Guion</Label>
              {panelKeys.map((k,i)=><div key={k} style={{display:"flex",gap:10,marginBottom:6,padding:"8px 10px",background:C.bg,borderRadius:8}}><div style={{width:20,height:20,borderRadius:"50%",background:C.grad,color:"#fff",fontSize:10,fontWeight:900,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{i+1}</div><div style={{fontSize:11,color:C.muted}}><strong style={{color:C.text}}>{i===0?"Setup":i===panelKeys.length-1?"🔥 Remate":"Giro"}:</strong> {result[k].descripcion}</div></div>)}
            </Card>
          )}
          <Card>
            <Label>💬 Frases hook · elige una</Label>
            {hooks.map((h,i)=><button key={i} onClick={()=>setSelHook(selHook===h?null:h)} style={{display:"block",width:"100%",textAlign:"left",padding:"10px 12px",marginBottom:6,background:selHook===h?`${C.accent}33`:C.bg,color:selHook===h?"#fff":C.text,border:`1.5px solid ${selHook===h?C.accent:C.border}`,borderRadius:10,cursor:"pointer",fontSize:13,fontWeight:700,lineHeight:1.5}}>{selHook===h?"✅ ":""}{h}</button>)}
            {selHook&&<button onClick={()=>copy(selHook,"hook")} style={{width:"100%",padding:"9px",borderRadius:9,cursor:"pointer",background:copied==="hook"?C.green:"transparent",color:copied==="hook"?"#fff":C.muted,border:`1.5px solid ${copied==="hook"?C.green:C.border}`,fontWeight:700,fontSize:12}}>{copied==="hook"?"✅ ¡Copiada!":"📋 Copiar frase"}</button>}
          </Card>
          <Card style={{background:"linear-gradient(135deg,#1a0533,#241640)"}}>
            <Label>🎨 Crear imágenes</Label>
            <div style={{fontSize:12,color:C.muted,marginBottom:8}}>{prompts.length===1?"Envía al Creador para generar la imagen":`${prompts.length} paneles — envía cada uno al Creador`}</div>
            {prompts.map((p,i)=><button key={i} onClick={()=>onSend(p)} style={{display:"block",width:"100%",padding:"11px",marginBottom:6,borderRadius:10,border:"none",background:C.grad,color:"white",fontWeight:800,fontSize:13,cursor:"pointer"}}>{prompts.length>1?`🎨 Crear panel ${i+1} →`:"🎨 Crear imagen en Generador →"}</button>)}
          </Card>
          <Btn onClick={generate} variant="ghost" style={{width:"100%"}}>🔄 Generar otro concepto</Btn>
        </div>
      )}
      {!result&&!loading&&(
        <div style={{textAlign:"center",padding:"40px 20px",color:C.muted}}>
          <div style={{fontSize:52,marginBottom:12}}>🎲</div>
          <div style={{fontWeight:700,fontSize:14,color:C.text,marginBottom:6}}>Modo Creativo · Groq AI</div>
          <div style={{fontSize:12,lineHeight:1.7}}>La IA crea el concepto, guion<br/>y frases hook <strong style={{color:C.green}}>gratis</strong><br/>Luego vas al Creador 🎨</div>
        </div>
      )}
    </div>
  );
}

// ─── SETTINGS TAB ─────────────────────────────────────────────────────────────
function SettingsTab({groqKey,setGroqKey,falKey,setFalKey,characters,setCharacters}){
  const [st,setSt]=useState("keys");
  const [gIn,setGIn]=useState("");
  const [fIn,setFIn]=useState("");
  const [editing,setEditing]=useState(null);
  const [newC,setNewC]=useState({nombre:"",emoji:"🐾",descripcion:"",referenceUrl:"",color:"#f472b6"});
  const [showNew,setShowNew]=useState(false);
  const COLS=["#4ade80","#f472b6","#fb923c","#38bdf8","#a78bfa","#facc15","#f87171","#34d399"];
  const saveC=c=>{if(!c.nombre.trim())return;if(editing){setCharacters(cs=>cs.map(x=>x.id===c.id?c:x));setEditing(null);}else{setCharacters(cs=>[...cs,{...c,id:Date.now().toString()}]);setNewC({nombre:"",emoji:"🐾",descripcion:"",referenceUrl:"",color:"#f472b6"});setShowNew(false);}};
  const CharForm=({char,setChar,onSave,onCancel,title})=>{
    const fileRef = React.useRef(null);
    const handleFile = (e) => {
      const file = e.target.files?.[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => setChar({...char, referenceUrl: ev.target.result});
      reader.readAsDataURL(file);
    };
    return(
    <div style={{background:C.bg,borderRadius:12,padding:14,border:`1.5px solid ${C.border}`,marginTop:8}}>
      <div style={{fontWeight:800,fontSize:13,color:C.text,marginBottom:10}}>{title}</div>
      <div style={{display:"flex",gap:8,marginBottom:8}}>
        <input value={char.emoji} onChange={e=>setChar({...char,emoji:e.target.value})} style={{width:46,padding:"8px",background:C.surface,border:`1.5px solid ${C.border}`,borderRadius:8,fontSize:18,textAlign:"center",color:"#fff",outline:"none"}} maxLength={2}/>
        <input value={char.nombre} onChange={e=>setChar({...char,nombre:e.target.value})} placeholder="Nombre" style={{flex:1,padding:"8px 12px",background:C.surface,border:`1.5px solid ${C.border}`,borderRadius:8,fontSize:13,color:C.text,outline:"none"}}/>
      </div>
      <div style={{display:"flex",gap:5,marginBottom:8,flexWrap:"wrap"}}>
        {COLS.map(c=><button key={c} onClick={()=>setChar({...char,color:c})} style={{width:24,height:24,borderRadius:"50%",background:c,border:char.color===c?"3px solid #fff":"none",cursor:"pointer"}}/>)}
      </div>
      <textarea value={char.descripcion} onChange={e=>setChar({...char,descripcion:e.target.value})} placeholder="Descripción en inglés para los prompts de imagen..." rows={3} style={{width:"100%",padding:"8px 12px",background:C.surface,border:`1.5px solid ${C.border}`,borderRadius:8,fontSize:11,color:C.text,outline:"none",marginBottom:8,resize:"none"}}/>

      {/* Reference image — upload or URL */}
      <div style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:0.8,marginBottom:6}}>🎯 Imagen de referencia (img2img)</div>

      {/* Upload button */}
      <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={handleFile}/>
      <button onClick={()=>fileRef.current?.click()} style={{width:"100%",padding:"10px",background:"linear-gradient(135deg,#059669,#10b981)",color:"white",border:"none",borderRadius:10,fontWeight:800,fontSize:13,cursor:"pointer",marginBottom:8}}>
        📷 Subir desde galería del celular
      </button>

      {/* OR URL input */}
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
        <div style={{flex:1,height:1,background:C.border}}/>
        <span style={{fontSize:10,color:C.muted}}>o pega una URL</span>
        <div style={{flex:1,height:1,background:C.border}}/>
      </div>
      <input value={char.referenceUrl?.startsWith("data:")?"":(char.referenceUrl||"")} onChange={e=>setChar({...char,referenceUrl:e.target.value})} placeholder="https://i.imgur.com/xxxxxx.png" style={{width:"100%",padding:"8px 12px",background:C.surface,border:`1.5px solid ${C.border}`,borderRadius:8,fontSize:11,color:C.text,outline:"none",marginBottom:8}}/>

      {/* Preview */}
      {char.referenceUrl&&(
        <div style={{marginBottom:10,position:"relative"}}>
          <img src={char.referenceUrl} alt="ref" style={{width:"100%",maxHeight:140,objectFit:"contain",borderRadius:8,background:"#222",display:"block"}} onError={e=>e.target.style.display="none"}/>
          <button onClick={()=>setChar({...char,referenceUrl:""})} style={{position:"absolute",top:6,right:6,width:24,height:24,borderRadius:"50%",background:"rgba(0,0,0,0.7)",color:"white",border:"none",cursor:"pointer",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
          <div style={{fontSize:9,color:char.referenceUrl.startsWith("data:")?C.green:C.muted,marginTop:4,textAlign:"center"}}>
            {char.referenceUrl.startsWith("data:")?"📷 Imagen subida desde galería ✅":"🔗 URL externa"}
          </div>
        </div>
      )}

      <div style={{display:"flex",gap:8}}>
        <Btn onClick={()=>saveC(char)} style={{flex:1,background:`linear-gradient(135deg,${char.color},${char.color}99)`}}>✅ Guardar</Btn>
        <Btn onClick={onCancel} variant="ghost" style={{padding:"12px 14px"}}>✕</Btn>
      </div>
    </div>
  );};
  return(
    <div style={{padding:"12px 16px",paddingBottom:80}}>
      <div style={{display:"flex",gap:8,marginBottom:16}}>
        {[["keys","🔑 API Keys"],["chars","🎭 Personajes"]].map(([k,l])=><button key={k} onClick={()=>setSt(k)} style={{flex:1,padding:"11px",borderRadius:12,border:"none",background:st===k?C.accent:C.card,color:st===k?"#fff":C.muted,fontWeight:st===k?800:600,fontSize:13,cursor:"pointer"}}>{l}</button>)}
      </div>
      {st==="keys"&&(
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <Card style={{background:groqKey?"#0a2e1a":C.card,border:`1.5px solid ${groqKey?"#16a34a":C.border}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:groqKey?0:10}}>
              <div><div style={{fontWeight:800,fontSize:13,color:groqKey?C.green:C.text}}>🤖 Groq · prompts gratis {groqKey?"✅":""}</div><div style={{fontSize:10,color:C.muted}}>{groqKey?"Llama 3.3 · 14,400 req/día · $0":"console.groq.com → API Keys"}</div></div>
              {groqKey&&<button onClick={()=>setGroqKey("")} style={{fontSize:10,color:"#f87171",background:"none",border:"none",cursor:"pointer"}}>Cambiar</button>}
            </div>
            {!groqKey&&<><input type="password" value={gIn} onChange={e=>setGIn(e.target.value)} placeholder="gsk_..." style={{width:"100%",padding:"10px 12px",background:C.bg,border:`1.5px solid ${C.border}`,borderRadius:10,fontSize:12,color:C.text,marginBottom:8,fontFamily:"monospace",outline:"none"}}/><Btn onClick={()=>{if(gIn.trim()){setGroqKey(gIn.trim());setGIn("");}}} variant="success" style={{width:"100%"}}>Guardar Groq Key</Btn></>}
          </Card>
          <Card style={{background:falKey?"#1a0a3a":C.card,border:`1.5px solid ${falKey?C.accent:C.border}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:falKey?0:10}}>
              <div><div style={{fontWeight:800,fontSize:13,color:falKey?"#a78bfa":C.text}}>⚡ fal.ai · imágenes + videos {falKey?"✅":""}</div><div style={{fontSize:10,color:C.muted}}>{falKey?"FLUX ~$0.003/img · Wan2.1 ~$0.03/vid":"fal.ai → Dashboard → API Keys"}</div></div>
              {falKey&&<button onClick={()=>setFalKey("")} style={{fontSize:10,color:"#f87171",background:"none",border:"none",cursor:"pointer"}}>Cambiar</button>}
            </div>
            {!falKey&&<><input type="password" value={fIn} onChange={e=>setFIn(e.target.value)} placeholder="xxxxxxxx-xxxx-xxxx-xxxx:xxxxxx" style={{width:"100%",padding:"10px 12px",background:C.bg,border:`1.5px solid ${C.border}`,borderRadius:10,fontSize:12,color:C.text,marginBottom:8,fontFamily:"monospace",outline:"none"}}/><Btn onClick={()=>{if(fIn.trim()){setFalKey(fIn.trim());setFIn("");}}} variant="primary" style={{width:"100%"}}>Guardar fal.ai Key</Btn></>}
          </Card>
          <Card style={{textAlign:"center",padding:"14px 16px"}}>
            <div style={{fontSize:11,color:C.muted,lineHeight:2}}>
              🤖 Groq (prompts): <strong style={{color:C.green}}>$0/mes</strong><br/>
              🖼️ 300 imágenes FLUX: <strong style={{color:"#a78bfa"}}>~$1/mes</strong><br/>
              🎬 300 videos Wan2.1: <strong style={{color:"#a78bfa"}}>~$9/mes</strong>
            </div>
          </Card>
        </div>
      )}
      {st==="chars"&&(
        <div>
          <div style={{fontSize:12,color:C.muted,marginBottom:12,lineHeight:1.6}}>Hasta 6 personajes. Con imagen de referencia usa img2img para máxima consistencia.</div>
          {characters.map(c=>(
            <div key={c.id} style={{marginBottom:8}}>
              {editing?.id===c.id
                ?<CharForm char={editing} setChar={setEditing} onSave={()=>saveC(editing)} onCancel={()=>setEditing(null)} title={`Editar ${c.nombre}`}/>
                :<div style={{display:"flex",alignItems:"center",gap:10,padding:"12px 14px",background:C.card,borderRadius:12,border:`1.5px solid ${C.border}`}}>
                  <div style={{width:36,height:36,borderRadius:"50%",background:`${c.color}22`,border:`2px solid ${c.color}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{c.emoji}</div>
                  <div style={{flex:1}}><div style={{fontWeight:800,fontSize:13,color:C.text}}>{c.nombre}</div><div style={{fontSize:10,color:c.referenceUrl?C.green:C.muted}}>{c.referenceUrl?"🎯 img2img activo":"Sin referencia"}</div></div>
                  <button onClick={()=>setEditing({...c})} style={{padding:"5px 9px",background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,fontSize:11,cursor:"pointer",color:C.muted}}>✏️</button>
                  {c.id!=="lito"&&<button onClick={()=>setCharacters(cs=>cs.filter(x=>x.id!==c.id))} style={{padding:"5px 9px",background:"#2d0a0a",border:"1px solid #5a1a1a",borderRadius:8,fontSize:11,cursor:"pointer",color:"#f87171"}}>🗑️</button>}
                </div>
              }
            </div>
          ))}
          {characters.length<6&&!showNew&&!editing&&<Btn onClick={()=>setShowNew(true)} style={{width:"100%",marginTop:4}}>➕ Agregar personaje</Btn>}
          {showNew&&<CharForm char={newC} setChar={setNewC} onSave={()=>saveC(newC)} onCancel={()=>setShowNew(false)} title="Nuevo personaje"/>}
          <Card style={{marginTop:12,padding:"10px 14px"}}><div style={{fontSize:11,color:C.muted,lineHeight:1.6}}>💡 Para escenas con varios personajes: genera una imagen con todos juntos → súbela a imgur → ponla como referencia.</div></Card>
        </div>
      )}
    </div>
  );
}

        </div>
      </div>
      {tab==="prompts"&&<PromptsTab onSend={sendToCreator}/>}
      {tab==="creator"&&<div style={{padding:"12px 16px",paddingBottom:80}}><GeneratorPanel initialPrompt={sharedPrompt} falKey={falKey} groqKey={groqKey} characters={characters}/></div>}
      {tab==="ia"&&<IATab groqKey={groqKey} onSend={sendToCreator}/>}
      {tab==="settings"&&<SettingsTab groqKey={groqKey} setGroqKey={setGroqKey} falKey={falKey} setFalKey={setFalKey} characters={characters} setCharacters={setCharacters}/>}
      <BottomNav active={tab} onChange={setTab} hasKeys={!!(groqKey&&falKey)}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
if("serviceWorker"in navigator){
  const c=`const V="lito-v3";self.addEventListener("install",e=>{e.waitUntil(caches.open(V).then(c=>c.addAll(["./"])));self.skipWaiting();});self.addEventListener("activate",e=>{e.waitUntil(caches.keys().then(k=>Promise.all(k.filter(x=>x!==V).map(x=>caches.delete(x)))));self.clients.claim();});self.addEventListener("fetch",e=>{e.respondWith(fetch(e.request).catch(()=>caches.match(e.request)));});`;
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([c],{type:"application/javascript"}))).catch(()=>{});
}
</script>
