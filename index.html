function usePersisted(key, def) {
  const [v, setV] = useState(() => {
    try {
      const s = localStorage.getItem(key);
      return s !== null ? JSON.parse(s) : def;
    } catch {
      return def;
    }
  });
  const set = useCallback(val => {
    setV(val);
    try {
      localStorage.setItem(key, JSON.stringify(val));
    } catch {}
  }, [key]);
  return [v, set];
}

async function genImage(falKey, prompt, refUrl, serviceId = "flux_schnell", aspectRatio = "square_hd", cfg = {}) {
  const svc = IMG_SERVICES.find(s => s.id === serviceId) || IMG_SERVICES[0];
  const strength      = cfg.strength      ?? 0.80;
  const steps         = cfg.steps         ?? 28;
  const stepsText2img = cfg.stepsText2img ?? svc.steps;

  // img2img cuando hay referencia
  if (refUrl && refUrl.trim()) {
    let imgUrl = refUrl.trim();

    if (imgUrl.startsWith("data:")) {
      throw new Error("La referencia debe ser una URL (https://...). Genera una imagen en 🎨 Crear, copia esa URL y pégala en ⚙️ Personajes.");
    }

    // Auto-corregir URLs de imgur (página → imagen directa)
    // https://imgur.com/pvw935d → https://i.imgur.com/pvw935d.jpg
    const imgurPage = imgUrl.match(/^https?:\/\/(?:www\.)?imgur\.com\/([a-zA-Z0-9]+)$/);
    if (imgurPage) {
      imgUrl = `https://i.imgur.com/${imgurPage[1]}.jpg`;
    }
    // https://imgur.com/gallery/xxx → no se puede auto-corregir
    if (imgUrl.includes("imgur.com/gallery") || imgUrl.includes("imgur.com/a/")) {
      throw new Error("Usa el link directo a la imagen, no al álbum. En imgur: abre la imagen sola → copia 'i.imgur.com/xxxxx.jpg'");
    }

    // Mapear aspect ratio preset → width/height
    const sizeMap = {
      "square_hd":      {width:1024,height:1024},
      "portrait_16_9":  {width:576, height:1024},
      "landscape_16_9": {width:1024,height:576},
      "portrait_4_3":   {width:819, height:1024},
    };
    const sz = sizeMap[aspectRatio] || sizeMap["square_hd"];

    const r = await fetch("https://fal.run/fal-ai/flux/dev/image-to-image", {
      method: "POST",
      headers: {"Authorization":`Key ${falKey}`,"Content-Type":"application/json"},
      body: JSON.stringify({
        image_url: imgUrl,
        prompt: prompt.slice(0, 600),
        strength: strength,
        num_inference_steps: steps,
        width: sz.width,
        height: sz.height,
      })
    });
    if (!r.ok) {
      const e = await r.json().catch(() => ({}));
      const detail = Array.isArray(e?.detail)
        ? e.detail.map(d => d.msg || JSON.stringify(d)).join(" | ")
        : typeof e?.detail === "string" ? e.detail : JSON.stringify(e?.detail || e?.message || e);
      // Mensaje amigable para error de imagen
      if (r.status === 422 && detail.includes("image")) {
        throw new Error(`URL de imagen inválida. Asegúrate de usar el link directo: i.imgur.com/xxx.jpg (no imgur.com/xxx)`);
      }
      throw new Error(`img2img error ${r.status}: ${detail}`);
    }
    const d = await r.json();
    const u = d.images?.[0]?.url;
    if (!u) throw new Error("img2img no devolvió imagen");
    return u;
  }

  // text2img estándar (sin referencia)
  const r = await fetch(svc.endpoint, {
    method: "POST",
    headers: {
      "Authorization": `Key ${falKey}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      prompt: prompt.slice(0, 500),
      image_size: aspectRatio,
      num_images: 1,
      num_inference_steps: stepsText2img
    })
  });
  if (!r.ok) {
    const e = await r.json().catch(() => ({}));
    throw new Error(e?.detail || e?.message || `HTTP ${r.status}`);
  }
  const d = await r.json();
  const u = d.images?.[0]?.url;
  if (!u) throw new Error("fal.ai no devolvió imagen");
  return u;
}
async function callGroq(key, sys, usr) {
  const r = await fetch("https://api.groq.com/openai/v1/chat/completions", {
    method: "POST",
    headers: {
      "Authorization": `Bearer ${key}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      model: "llama-3.3-70b-versatile",
      messages: [{
        role: "system",
        content: sys
      }, {
        role: "user",
        content: usr
      }],
      max_tokens: 1000,
      temperature: 0.9
    })
  });
  if (!r.ok) {
    const e = await r.json().catch(() => {});
    throw new Error(e?.error?.message || `Groq HTTP ${r.status}`);
  }
  return (await r.json()).choices?.[0]?.message?.content || "";
