// ─── API: GROQ ────────────────────────────────────────────────────────────────
async function callGroq(key, sys, usr, opts = {}) {
  if (!key) throw new Error("Necesitas tu Groq API key en ⚙️");
  const r = await fetch("https://api.groq.com/openai/v1/chat/completions", {
    method: "POST",
    headers: {
      "Authorization": `Bearer ${key}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      model: "llama-3.3-70b-versatile",
      messages: [{
        role: "system",
        content: sys
      }, {
        role: "user",
        content: usr
      }],
      max_tokens: opts.max_tokens || 2000,
      temperature: opts.temperature ?? 0.95
    })
  });
  if (!r.ok) {
    const e = await r.json().catch(() => ({}));
    throw new Error(e?.error?.message || `Groq HTTP ${r.status}`);
  }
  const data = await r.json();
  return data.choices?.[0]?.message?.content || "";
}
function parseJson(text) {
  const clean = text.replace(/```json|```/g, "").trim();
  // Sometimes the model adds a preamble; try to extract JSON
  const jsonStart = clean.indexOf("{") >= 0 ? clean.indexOf("{") : clean.indexOf("[");
  if (jsonStart > 0) {
    return JSON.parse(clean.slice(jsonStart));
  }
  return JSON.parse(clean);
}

async function generateImageIdeas(groqKey, params) {
  const {
    ocasion,
    humor,
    angulo,
    formato,
    charactersDesc,
    customTopic,
    count
  } = params;
  const oc = OCASIONES.find(o => o.id === ocasion);
  const hu = TIPOS_HUMOR.find(h => h.id === humor);
  const an = ANGULOS.find(a => a.id === angulo);
  const fm = FORMATOS.find(f => f.id === formato);
  const panels = formato === "single" ? 1 : formato === "comic2" ? 2 : formato === "comic3" ? 3 : 4;
  const panelSchema = panels === 1 ? `"prompt_imagen": "prompt completo en INGLÉS para generador de imágenes, incluye descripción del personaje, pose exacta, expresión facial detallada, props, mood, fondo"` : Array.from({
    length: panels
  }, (_, i) => `"panel${i + 1}": {"descripcion":"qué pasa en este panel en español, breve","prompt_imagen":"prompt completo EN INGLÉS"}`).join(",\n    ");
  const sys = `Eres un experto en contenido viral para Facebook en español latino, especializado en memes con personajes chibi adorables.

REGLAS CRÍTICAS:
1. Cada idea debe ser ÚNICA y diferente entre sí. NO repitas conceptos.
2. Los prompts de imagen deben estar en INGLÉS y describir: pose exacta, expresión facial muy detallada, props específicos, mood, fondo simple.
3. Las frases hook deben estar en español latino coloquial natural — máximo 20 palabras, con emojis, que inciten a comentar/etiquetar/compartir.
4. Cada idea debe tener un "viral_score" honesto del 1-10 con razón breve.
5. Responde SOLO con JSON válido, sin markdown, sin explicaciones extra.

PERSONAJES (incluye su descripción en cada prompt_imagen):
${charactersDesc}

SCHEMA exacto:
{
  "ideas": [
    {
      "titulo": "título corto y atractivo (max 6 palabras)",
      "concepto": "explicación del meme en 1-2 frases",
      ${panelSchema},
      "frases_hook": ["frase 1 con emojis", "frase 2 distinta", "frase 3 distinta", "frase 4 distinta", "frase 5 distinta"],
      "viral_score": 8,
      "viral_razon": "por qué funcionaría brevemente",
      "engagement_tip": "consejo concreto para maximizar engagement"
    }
  ]
}`;
  const usr = `Genera ${count} IDEAS DIFERENTES Y CREATIVAS de memes de Lito.

CONTEXTO:
- Ocasión/tema: ${oc.label} ${oc.emoji}
- Tipo de humor: ${hu.label} — ${hu.desc}
- Ángulo creativo: ${an.label}
- Formato: ${fm.label} (${panels} ${panels === 1 ? "imagen" : "paneles"})
${customTopic ? `- Detalle adicional: ${customTopic}` : ""}

OBJETIVO: ${count} ideas que sean MUY virales en Facebook México/Latino. Que la gente quiera etiquetar a sus amigos, comentar, compartir.

Mezcla ${oc.label} + ${hu.label} de formas inesperadas. Sé creativo, no obvio.`;
  const text = await callGroq(groqKey, sys, usr, {
    temperature: 0.95,
    max_tokens: 4000
  });
  const parsed = parseJson(text);
  return parsed.ideas || [];
}
